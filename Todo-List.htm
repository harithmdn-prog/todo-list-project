*Todo List*
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <link rel="stylesheets" href="styles.css">
    <title>Styled To-Do List</title>
</head>

<body>
    <h1>Daily Repair Task List</h1>

<div class="box">
    <h2>Incoming Repair</h2>
    <ul class="todo-list">
        <li>
            <label class="custom-checkbox" for="phone-model">
            <input id="phone-model" type="checkbox">
            <span></span>Note Phone Model</label>
            
            <ul class="sub-item">
                <li><a class="sub-item-link" href="\" target="_blank">phone model list</a></li>
            </ul>        
        </li>
        <li>
        <label class="custom-checkbox" for="imei"> 
        <input id="imei" type="checkbox">   <span></span>Check Imei Number</label>
        <ul class="sub-item">
                <li><a class="sub-item-link" href="\" target="_blank">phone model list</a></li>
            </ul>
        </li>
        <li>
            <label class="custom-checkbox" for="phone-pic">
            <input id="phone-pic" type="checkbox"> <span></span> Take Phone Picture</label>
            <ul class="sub-item">
                <li><a class="sub-item-link" href="\" target="_blank">phone model list</a></li>
            </ul>
            
        </li>
        <li>
            <label class="custom-checkbox" for="basic-function">
            <input id="basic-function" type="checkbox" >   <span></span>Test Basic Function</label>
            <ul class="sub-item">
                <li><a class="sub-item-link" href="\" target="_blank">phone model list</a></li>
            </ul> 
        </li>    
    
</div>           

</body>

</html>
